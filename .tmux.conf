# ~/.tmux.conf — Scott's dotfiles (managed in ~/dev/dotfiles).

# --- key bindings: Ctrl-A prefix, screen-style ---
unbind C-b
set -g prefix C-a
unbind l
bind-key C-a last-window
bind a send-prefix

# --- pane splitting ---
unbind %
bind | split-window -h
bind - split-window -v

# --- terminal + responsiveness (travel rig, 2026-07-11; see vault Meta/Setup § Remote / travel rig) ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0
set -g focus-events on
set -g mouse on
set -g set-clipboard on          # OSC52: copying in tmux reaches the local (Mac) clipboard over ssh
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off     # killing a session drops to the next one, not out of tmux
# aggressive-resize REMOVED 2026-07-11: iTerm2 tmux -CC hard-refuses it ("not compatible");
# window-size latest (tmux ≥3.1) already handles mixed-size clients.
set -g window-size latest        # mixed clients (desk Konsole + 14" MacBook): size to the active client

# --- titles + status: "which session needs me" at a glance ---
set -g set-titles on
set -g set-titles-string "#S:#W — #T"     # iTerm2 native tab/window titles mirror tmux
setw -g monitor-activity on
setw -g monitor-bell on
set -g activity-action other
set -g bell-action any
set -g visual-activity off                # flags in the status bar, not popup messages
set -g status-interval 5
set -g status-style bg=black,fg=white
set -g status-left-length 20
set -g status-left '#[fg=green]#H #[fg=cyan]#S '
set -g status-right '#[fg=yellow]%a %m-%d %H:%M'
set -g window-status-current-style bg=red
set -g window-status-activity-style bg=yellow,fg=black    # window printed output since you looked
set -g window-status-bell-style bg=magenta,fg=black       # window rang the bell (Claude waiting on you)

# --- automatic per-pane session logging (added 2026-07-01; see dotfiles README) ---
# Logs each pane to ~/.local/state/terminal-logs via ~/.config/tmux-log.sh; read with `tlog`.
# history-limit 100000→50000 (2026-07-11): big in-RAM scrollback makes iTerm2 tmux -CC reattach slow;
# tlog keeps the lossless full record on disk (`tlog view` re-renders it).
set -g history-limit 50000
set-hook -g after-new-session   'run-shell "~/.config/tmux-log.sh #{pane_id}"'
set-hook -g after-new-window    'run-shell "~/.config/tmux-log.sh #{pane_id}"'
set-hook -g after-split-window  'run-shell "~/.config/tmux-log.sh #{pane_id}"'

# --- resurrect, manual-only: layout save/restore (2026-07-11; continuum REMOVED 2026-07-14) ---
# prefix+Ctrl-s save · prefix+Ctrl-r restore — layout + cwd only (not running programs;
# re-run `claude --resume` per window). Continuum's 15-min autosave walked every pane's
# full process tree on the single-threaded server — prime suspect in the 2026-07-13 wedge
# (saves stopped 19:32; server half-dead overnight, exited 07-14 08:07). Boot bringup is
# now systemd: tmux-rig.service runs `rig` (vault Meta/Setup § Remote / travel rig).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'
