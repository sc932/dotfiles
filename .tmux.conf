# ~/.tmux.conf — Scott's dotfiles (managed in ~/dev/dotfiles).

# --- key bindings: Ctrl-A prefix, screen-style ---
unbind C-b
set -g prefix C-a
unbind l
bind-key C-a last-window
bind a send-prefix

# --- pane splitting ---
unbind %
bind | split-window -h
bind - split-window -v

# --- status bar (modernized for tmux >=2.9: *-style replaces *-bg/*-fg) ---
set -g status-style bg=black,fg=white
set -g status-left '#[fg=green]#H'
set -g window-status-current-style bg=red

# --- automatic per-pane session logging (added 2026-07-01; see dotfiles README) ---
# Logs each pane to ~/.local/state/terminal-logs via ~/.config/tmux-log.sh; read with `tlog`.
set -g history-limit 100000
set-hook -g after-new-session   'run-shell "~/.config/tmux-log.sh #{pane_id}"'
set-hook -g after-new-window    'run-shell "~/.config/tmux-log.sh #{pane_id}"'
set-hook -g after-split-window  'run-shell "~/.config/tmux-log.sh #{pane_id}"'
